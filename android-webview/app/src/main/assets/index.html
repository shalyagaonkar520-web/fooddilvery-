<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Mom's Magic - BTM Layout</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0B0E14;color:#fff;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#map{flex:1;z-index:1}
.top-bar{padding:12px 16px;background:#0B0E14;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10px;z-index:10}
.top-bar h1{font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.8)}
.top-bar .dot{width:8px;height:8px;border-radius:50%;background:#FF4D00}
.bottom-panel{background:#0B0E14;border-top:1px solid rgba(255,255,255,0.05);padding:16px;z-index:10;max-height:45vh;overflow-y:auto}
.info-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.03);border-radius:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.05)}
.info-row .label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.3)}
.info-row .value{font-size:13px;font-weight:700;color:#fff}
.info-row .coords{font-size:10px;font-family:monospace;color:rgba(255,255,255,0.2);margin-top:2px}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.status-badge.ok{background:rgba(16,185,129,0.1);color:#34D399;border:1px solid rgba(16,185,129,0.2)}
.status-badge.no{background:rgba(239,68,68,0.1);color:#F87171;border:1px solid rgba(239,68,68,0.2)}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:14px;border:none;border-radius:16px;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:all 0.2s}
.btn-locate{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1)}
.btn-locate:active{background:rgba(255,255,255,0.1)}
.btn-confirm{background:#FF4D00;color:#fff;box-shadow:0 8px 24px rgba(255,77,0,0.3)}
.btn-confirm:active{transform:scale(0.97)}
.btn-confirm:disabled{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.2);box-shadow:none}
.nearby-list{margin-top:8px}
.nearby-item{padding:8px 12px;background:rgba(99,102,241,0.05);border-radius:10px;margin-bottom:4px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);border:1px solid rgba(99,102,241,0.1)}
.leaflet-container{background:#0B0E14!important}
.leaflet-popup-content-wrapper{background:#161A22!important;color:#fff!important;border-radius:12px!important;border:1px solid rgba(255,255,255,0.1)!important;box-shadow:0 10px 30px rgba(0,0,0,0.5)!important}
.leaflet-popup-tip{background:#161A22!important}
.leaflet-popup-content b{color:#FF4D00}
.leaflet-control-zoom{border:1px solid rgba(255,255,255,0.1)!important;border-radius:10px!important;overflow:hidden}
.leaflet-control-zoom a{background:#161A22!important;color:rgba(255,255,255,0.6)!important;border-color:rgba(255,255,255,0.05)!important}
</style>
</head>
<body>
<div class="top-bar"><div class="dot"></div><h1>Select Delivery Location</h1></div>
<div id="map"></div>
<div class="bottom-panel">
  <div class="info-row" id="address-row" style="display:none">
    <div style="flex:1"><div class="label">Delivery Address</div><div class="value" id="address-text">-</div><div class="coords" id="coords-text">-</div></div>
  </div>
  <div class="info-row" id="distance-row" style="display:none">
    <div style="flex:1"><div class="label">Distance</div><div class="value" id="distance-text">-</div></div>
    <div id="status-badge"></div>
  </div>
  <div id="nearby-section" style="display:none">
    <div class="info-row"><div class="label" id="nearby-count">Nearby Restaurants</div></div>
    <div class="nearby-list" id="nearby-list"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-locate" onclick="useMyLocation()">📍 My Location</button>
    <button class="btn btn-confirm" id="confirm-btn" disabled onclick="confirmLocation()">Confirm</button>
  </div>
</div>
<script>
const RESTAURANT={lat:12.9165,lng:77.6101};
const MAX_RANGE=10;
let map,marker,restaurantMarker,nearbyMarkers=[],circle;
let selectedLat=null,selectedLng=null,selectedAddress='';

map=L.map('map',{zoomControl:false}).setView([RESTAURANT.lat,RESTAURANT.lng],14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

restaurantMarker=L.marker([RESTAURANT.lat,RESTAURANT.lng]).addTo(map)
  .bindPopup("<b>Mom's Magic Kitchen</b>");

map.on('click',function(e){updateLocation(e.latlng.lat,e.latlng.lng)});

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function reverseGeocode(lat,lng){
  try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
  const d=await r.json();if(d.address){const a=d.address;return[a.neighbourhood||a.suburb||a.hamlet||'',a.city||a.town||a.village||'',a.state||''].filter(Boolean).join(', ')||d.display_name}return d.display_name||'Unknown'}catch{return'Unable to fetch'}
}

async function fetchNearby(lat,lng){
  try{const q=`[out:json][timeout:10];(node["amenity"="restaurant"](around:2000,${lat},${lng});node["amenity"="fast_food"](around:2000,${lat},${lng}););out body 15;`;
  const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q),headers:{'Content-Type':'application/x-www-form-urlencoded'}});
  const d=await r.json();return(d.elements||[]).map(e=>({id:e.id,name:e.tags?.name||'Unnamed',lat:e.lat,lng:e.lon,cuisine:e.tags?.cuisine||''}))}catch{return[]}
}

async function updateLocation(lat,lng){
  selectedLat=lat;selectedLng=lng;
  const dist=haversine(RESTAURANT.lat,RESTAURANT.lng,lat,lng).toFixed(2);
  const deliverable=dist<=MAX_RANGE;
  
  if(marker)marker.setLatLng([lat,lng]);else marker=L.marker([lat,lng]).addTo(map);
  if(circle)map.removeLayer(circle);
  circle=L.circle([RESTAURANT.lat,RESTAURANT.lng],{radius:MAX_RANGE*1000,color:'#FF4D00',fillOpacity:0.03,weight:1,dashArray:'6,4'}).addTo(map);
  map.panTo([lat,lng]);

  document.getElementById('address-row').style.display='';
  document.getElementById('distance-row').style.display='';
  document.getElementById('coords-text').textContent=`${lat.toFixed(6)}, ${lng.toFixed(6)}`;
  document.getElementById('distance-text').textContent=dist+' km';
  document.getElementById('status-badge').innerHTML=deliverable?'<span class="status-badge ok">✓ Deliverable</span>':'<span class="status-badge no">✗ Out of Range</span>';
  document.getElementById('confirm-btn').disabled=false;
  document.getElementById('address-text').textContent='Loading...';

  selectedAddress=await reverseGeocode(lat,lng);
  document.getElementById('address-text').textContent=selectedAddress;
  marker.bindPopup('<b>Delivery Here</b><br/>'+selectedAddress);

  const nearby=await fetchNearby(lat,lng);
  nearbyMarkers.forEach(m=>map.removeLayer(m));nearbyMarkers=[];
  if(nearby.length){
    document.getElementById('nearby-section').style.display='';
    document.getElementById('nearby-count').textContent=nearby.length+' Nearby Restaurants';
    document.getElementById('nearby-list').innerHTML=nearby.map(r=>`<div class="nearby-item">🍽️ ${r.name}${r.cuisine?' · '+r.cuisine:''}</div>`).join('');
    nearby.forEach(r=>{const m=L.circleMarker([r.lat,r.lng],{radius:5,color:'#6366F1',fillColor:'#818CF8',fillOpacity:0.8}).addTo(map).bindPopup('<b>'+r.name+'</b>');nearbyMarkers.push(m)});
  }
  
  // Send to Android WebView if available
  if(window.AndroidBridge){window.AndroidBridge.onLocationSelected(lat,lng,selectedAddress,parseFloat(dist),deliverable)}
}

function useMyLocation(){
  if(!navigator.geolocation){alert('Geolocation not supported');return}
  navigator.geolocation.getCurrentPosition(p=>{updateLocation(p.coords.latitude,p.coords.longitude);map.setView([p.coords.latitude,p.coords.longitude],16)},
  e=>{alert('Location access denied. Please enable GPS.')},{enableHighAccuracy:true,timeout:10000});
}

function confirmLocation(){
  if(selectedLat!==null){
    const data={lat:selectedLat,lng:selectedLng,address:selectedAddress};
    localStorage.setItem('deliveryLocation',JSON.stringify(data));
    if(window.AndroidBridge){window.AndroidBridge.onLocationConfirmed(selectedLat,selectedLng,selectedAddress)}
    alert('Location confirmed: '+selectedAddress);
  }
}
</script>
</body>
</html>
